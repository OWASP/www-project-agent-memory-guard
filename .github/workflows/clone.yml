name: GitHub Clone Count Update Everyday

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: gh-clone-count-badge
        uses: MShawon/github-clone-count-badge@master
        env:
          GITHUB_TOKEN: ${{ secrets.SECRET_TOKEN }}
