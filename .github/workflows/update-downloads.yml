name: Update Download Stats Daily

on:
  schedule:
    - cron: "30 0 * * *"  # Run daily at 00:30 UTC
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          token: ${{ secrets.SECRET_TOKEN }}

      - name: Fetch download counts
        id: downloads
        run: |
          # Get total downloads from pepy.tech badges (all-time, accurate)
          curl -sL "https://static.pepy.tech/badge/agent-memory-guard" -o /tmp/amg_badge.svg
          curl -sL "https://static.pepy.tech/badge/langchain-agent-memory-guard" -o /tmp/lc_badge.svg
          
          # Parse badge SVG values (e.g., "1.3k", "594", "2k")
          AMG=$(python3 -c "
          import re
          with open('/tmp/amg_badge.svg') as f:
              svg = f.read()
          # Find the download count in the SVG text
          matches = re.findall(r'>([0-9,.]+[kKmM]?)</text>', svg)
          val = matches[-1] if matches else '0'
          val = val.replace(',','')
          if 'k' in val.lower():
              num = float(val.lower().replace('k','')) * 1000
          elif 'm' in val.lower():
              num = float(val.lower().replace('m','')) * 1000000
          else:
              num = float(val)
          print(int(num))
          ")
          
          LANGCHAIN=$(python3 -c "
          import re
          with open('/tmp/lc_badge.svg') as f:
              svg = f.read()
          matches = re.findall(r'>([0-9,.]+[kKmM]?)</text>', svg)
          val = matches[-1] if matches else '0'
          val = val.replace(',','')
          if 'k' in val.lower():
              num = float(val.lower().replace('k','')) * 1000
          elif 'm' in val.lower():
              num = float(val.lower().replace('m','')) * 1000000
          else:
              num = float(val)
          print(int(num))
          ")
          
          # Get clone count from gist (maintained by clone.yml action)
          CLONES=$(curl -s "https://gist.githubusercontent.com/vgudur-dev/c04e12f68c363625faf12faaf03a03ca/raw/clone.json" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['count'])")
          
          TOTAL=$((AMG + LANGCHAIN + CLONES))
          echo "amg=$AMG" >> $GITHUB_OUTPUT
          echo "langchain=$LANGCHAIN" >> $GITHUB_OUTPUT
          echo "clones=$CLONES" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "Total: $TOTAL (AMG PyPI: $AMG, LangChain PyPI: $LANGCHAIN, Clones: $CLONES)"

      - name: Update README with latest total
        run: |
          TOTAL=${{ steps.downloads.outputs.total }}
          # Round down to nearest 100 for display
          DISPLAY=$(python3 -c "print(f'{int($TOTAL / 100) * 100:,}+')")
          # Update the downloads line in README
          sed -i "s/### 📦 [0-9,]*+ total downloads/### 📦 $DISPLAY total downloads/" README.md
          
      - name: Commit and push if changed
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update download stats [skip ci]"
            git push
          fi
